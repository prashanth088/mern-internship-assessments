    <style>
        *{
            margin: 0;

            box-sizing: border-box;

        }
        header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background-color: rgb(11, 70, 110) !important;
        }

            padding: 0;
            display: flex;
            
        }
        div h1{
            color: white;
            font-size: 24px;
            flex-grow: 1;
            margin-left: 20px;
            padding: 20px;
        }
        header ul{
            display: flex;
            justify-content: space-evenly;
            list-style: none;
            align-items: center;
        }
        header ul li{
            display: flex;
            margin: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            
            
        }
        header ul li a:hover{
            background-color: rgb(23, 17, 99);
            color: white;
        }
        header ul li:hover{
            font-weight: bold;
            font-style: italic;
            font-size: 22px;
            color: mediumvioletred;
        }
        a{
            text-decoration: none;
            color: white;
        }
        main{
            justify-content: center;
            align-items: center;
            height: 100vh;
            }
        main nav h2{
            margin-left: 25%;
            padding: 10px;
            font-size: 36px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            align-items: center;
        }
        main nav p {
            margin-left: 27%;
            padding: 10px;
            font-size: 18px;
            align-items: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        main div{
            margin-top:15%;
            margin-left: 40%;
            padding: 6px;
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            width: 480px;
            aspect-ratio: 16 / 9;
        }
        main div iframe{
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
