<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Feedback Form</title>
    <style>
        body{
        font-family: Arial, sans-serif;
        background-color: #ffffff; 
        display: flex;
        justify-content: center;
        margin-top: 50px; 
        }
        .form-container {
            background-color: #ffffff;
            padding: 25px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 420px;
        }
        fieldset {
            border: 2px solid #000000;
            width: 450px;
            padding: 20px 30px;
        }
        legend {
            font-weight: bold;
            font-size: 16px;
            padding: 0 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .filled-input {
            background-color: #e8f0fe;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        .radio-group label {
            display: inline;
            margin: 0;
            cursor: pointer;
        }
        textarea {
            resize: vertical;
            height: 60px;
        }
        button {
            background-color: #e1e1e1;
            color: #000000;
            border: 1px solid #000000;
            padding: 6px 15px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #d4d4d4;
        }
    </style>
</head>
<body>
    <div class="form-container">
    <form action="" method="POST">
        <filedset>
            <legend>User personal information</legend>
            <div class="form-group">
                <label>Enter full name</label><br>
                <input type="text" class="filled-input" value="Rahul Kumar">
            </div>
            <div class="form-group">
                <label>Enter your email</label><br>
                <input type="email" class="filled-input" value="geeks@12345gmail.com">
            </div>
            <div class="form-group">
                <label>Enter your password</label><br>
                <input type="password">
            </div>
            <div class="form-group">
                <label>confirm your password</label><br>
                <input type="password">
            </div>
            <div class="form-group">
                <label for="gen">Enter your gender</label>
                <div class="radio-group">
                    <label><input type="radio" id="gen" value="male" checked>Male</label>
                    <label><input type="radio" id="gen" value="female">Female</label>
                    <label><input type="radio" id="gen" value="neutral">Neutral</label>
                </div>
            </div>
            <div class="form-group">
                <label for="dob">Enter your Date of Birth</label>
                <input type="date" id="dob" value="2009-06-10">
            </div>
            <div class="form-group">
                <label for="add">Enter your address:</label>
                <textarea id="add">Noida sector 137</textarea>
            </div>
            <button type="submit">submit</button>
        </filedset>
    </form>
    </div>
</body>
</html>
